<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">United Voices Interpretation favicon</title>
  <desc id="desc">A neutral circular mark with the letters UVI.</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3650" />
      <stop offset="100%" stop-color="#4f6b88" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="#f5f6f4" />
  <circle cx="32" cy="32" r="23" fill="url(#grad)" />
  <text x="32" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="'Source Sans 3', 'Gill Sans', 'Trebuchet MS', sans-serif">UVI</text>
</svg>
